version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: api-metering-postgres
    environment:
      POSTGRES_DB: api_metering
      POSTGRES_USER: api_metering
      POSTGRES_PASSWORD: api_metering_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_metering"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: api-metering-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-metering-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://api_metering:api_metering_password@postgres:5432/api_metering
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: api-metering-frontend
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
